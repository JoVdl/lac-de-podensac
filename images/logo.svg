<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="22" fill="#6aab9c"/>
  <!-- Boat hull -->
  <path d="M 52,138 Q 100,152 148,138 L 144,128 Q 100,142 56,128 Z" stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- Boat deck line -->
  <line x1="58" y1="128" x2="142" y2="128" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Person - torso -->
  <line x1="95" y1="122" x2="95" y2="128" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Person - head -->
  <circle cx="95" cy="113" r="8.5" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Person - hat brim -->
  <line x1="85" y1="109" x2="105" y2="109" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Person - hat top -->
  <path d="M 89,109 Q 95,102 101,109" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arm holding rod -->
  <line x1="95" y1="122" x2="108" y2="118" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Other arm -->
  <line x1="95" y1="122" x2="83" y2="126" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fishing rod -->
  <line x1="108" y1="118" x2="145" y2="88" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fishing line -->
  <path d="M 145,88 Q 152,108 142,128" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Hook dot -->
  <circle cx="142" cy="128" r="2.5" fill="white"/>
  <!-- Water wave 1 -->
  <path d="M 42,148 Q 58,143 74,148 Q 90,153 106,148 Q 122,143 138,148 Q 150,153 158,148" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Water wave 2 (small) -->
  <path d="M 50,158 Q 70,153 90,158 Q 110,163 130,158 Q 148,154 155,158" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Text -->
  <text x="100" y="183" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" letter-spacing="2.5">LAC DE PODENSAC</text>
</svg>
